<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fazer Reserva</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-5">
    <div class="card col-md-6 mx-auto shadow">
      <div class="card-body">
        <h3 class="card-title text-success">Reservar Livro</h3>
        <p class="text-muted">Você está reservando: <strong>{{ livro.nome }}</strong></p>
        <hr>
        
        <form method="POST">
          {% csrf_token %}
          {% load crispy_forms_tags %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-success btn-block mt-3">Confirmar Reserva</button>
          <a href="/livros/" class="btn btn-secondary btn-block">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
